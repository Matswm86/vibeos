---
# Welcome module — first screen. Disabled most optional links so the
# greeting stays short; the three URLs that matter point at our site.
showSupportUrl:         true
showKnownIssuesUrl:     true
showReleaseNotesUrl:    false
showDonateUrl:          false

# Minimum hardware requirements. Display + room for Ollama models means
# we want at least 8 GB RAM, 30 GB disk — but hard-block only below the
# survive-install floor.
requirements:
    requiredStorage:    15.0
    requiredRam:        2.0
    internetCheck:      false
    check:
        - storage
        - ram
        - power
        - root
        - screen
    required:
        - storage
        - ram
        - root

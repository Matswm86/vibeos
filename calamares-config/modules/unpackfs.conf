---
# VibeOS ships as a mkosi disk image — no separate squashfs. The live
# session IS the reference rootfs, so Calamares copies from "/" with
# generous excludes to avoid recursing into mounted pseudo-filesystems
# and the installer state itself.
unpack:
    -   source:       "/"
        sourcefs:     "file"
        destination:  ""
        exclude:
            - /dev
            - /proc
            - /sys
            - /tmp
            - /run
            - /mnt
            - /media
            - /lost+found
            - /boot/efi
            - /cdrom
            - /target
            - /var/tmp
            - /var/cache/apt/archives
            - /var/lib/apt/lists
            - /home/vibeos/.cache
            - /etc/calamares

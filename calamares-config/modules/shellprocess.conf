---
# Pre-bootloader: re-create the directories that unpackfs excluded
# (notably /tmp). Without /tmp on the target rootfs, kernel-install
# fails with "Failed to create staging area: No such file or directory".

dontChroot: false
timeout:    30

script:
    - mkdir -p /tmp /var/tmp /run /mnt /media /cdrom /home /target
    - chmod 1777 /tmp /var/tmp
    - chmod 0755 /run /mnt /media /cdrom /home

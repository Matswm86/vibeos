---
# systemd-boot — same bootloader mkosi installs on the live image, keeps
# the install path identical to the reference.
efiBootLoader:        "systemd-boot"

# Entry titles / kernel naming. The Pacific Dawn loader.conf shipped in
# vibeos-desktop handles the menu timeout + console mode.
kernel:        "/vmlinuz-linux"
img:           "/initramfs-linux.img"
fallback:      "/initramfs-linux-fallback.img"
timeout:       "3"
grubInstall:   "grub-install"
grubMkconfig:  "grub-mkconfig"
grubCfg:       "/boot/grub/grub.cfg"
grubProbe:     "grub-probe"
efiBootloaderId: "VibeOS"

installEFIFallback: true

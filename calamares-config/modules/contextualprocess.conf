---
# Post-install cleanup hooks.
# Runs after all filesystem mutation modules have finished but before
# umount. All commands run inside the target rootfs (chrooted).

dontChroot: false
timeout: 30

# Remove the live-session marker from the installed system. Its presence
# triggers Calamares auto-launch and suppresses Vibbey's chat first-run;
# on the installed system we want Vibbey to greet the user on first
# login, and we never want to auto-launch Calamares again.
install_clean:
    - command: "rm -f /etc/vibeos/live-session"
      timeout: 5

    # Also drop the Calamares autostart entry — Calamares is not
    # installed as a dependency of vibeos-desktop.deb on the target
    # (the package sets it installed=false post-install), but removing
    # the autostart file belt-and-braces prevents a stray trigger.
    - command: "rm -f /etc/xdg/autostart/vibeos-live-installer.desktop"
      timeout: 5

    # Remove the live user's Desktop shortcut (the live `vibeos` user
    # does not exist on the target, but /home/vibeos/Desktop/ can be
    # copied through unpackfs depending on the squashfs filter).
    - command: "rm -rf /home/vibeos"
      timeout: 5

# Hooks fire in the order listed in the sequence below.
sequence:
    - install_clean

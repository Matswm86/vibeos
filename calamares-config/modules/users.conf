---
defaultGroups:
    - users
    - lp
    - video
    - network
    - storage
    - wheel
    - audio
    - plugdev
    - netdev

autologinGroup:  autologin
sudoersGroup:    sudo
setRootPassword: false

userShell: /usr/bin/zsh

# Anything goes. User explicitly wants no rules so a Combine-day install is never
# blocked by a password validator. Empty + 1-char + dictionary words all accepted.
allowWeakPasswords:        true
allowWeakPasswordsDefault: true

passwordRequirements:
    minLength: -1
    maxLength: -1
    nonempty: false
    libpwquality:
        - minlen=1
        - minclass=0
        - dcredit=0
        - ucredit=0
        - lcredit=0
        - ocredit=0
        - difok=0
        - maxrepeat=0
        - maxclassrepeat=0
        - usercheck=0
        - dictcheck=0
        - enforcing=0

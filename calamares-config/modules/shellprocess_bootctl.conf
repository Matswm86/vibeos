---
# Post-bootloader: run /usr/local/sbin/vibeos-bootloader-fix.sh inside
# the target chroot. The bash logic lives in the script file (not in
# this YAML) because Calamares' shellprocess does template substitution
# on every "$" it sees — every shell variable was getting flagged as a
# missing Calamares variable.
#
# What the script does (full rationale + step-by-step in the script
# itself):
#   A. Mount the live USB ESP read-only (label "ESP", target ESP is
#      labelled "EFI" for unambiguous detection).
#   B. Copy live ESP's /vibeos/ tree + loader entries to target ESP,
#      replacing whatever Calamares' broken bootloader.py produced.
#   C. Force-install systemd-bootx64.efi to /EFI/systemd/ and
#      /EFI/BOOT/BOOTX64.EFI (firmware fallback).
#   D. Inject root=UUID= into every loader entry, persist cmdline to
#      /etc/kernel/cmdline for future kernel installs.
#   E. Retype root partition to x86_64-root GPT type so
#      systemd-gpt-auto-generator finds it as a second pathway.
#   F. loader.conf with console-mode max.
#   G. Audit log to /var/log/vibeos-bootctl-install.log on the target.
#
# This is the third bootloader bug in this saga — first install
# couldn't boot (no systemd-bootx64.efi), second install booted
# systemd-boot but VibeOS entry hung (no root= in cmdline + no initrd
# in entry). This run trusts the live USB's already-working ESP.

dontChroot: false
timeout:    180

script:
    - /usr/local/sbin/vibeos-bootloader-fix.sh

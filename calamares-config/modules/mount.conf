---
# Standard mount helpers the exec phase needs before chroot-ing.
#
# IMPORTANT: `options` MUST be a YAML list, not a bare string.
# Calamares' mount module joins options with "," — and if you pass a
# string, Python iterates it character-by-character, turning
#   options: bind
# into the literal mount command  `-o b,i,n,d`. /dev never gets
# bind-mounted, then kernel-install can't see /dev/nvmeXnYpZ from
# inside the chroot and the bootloader job dies with
#   "Failed to open file system /dev/nvme0n1p1: No such file or directory"
# Wrap every options value in [ ... ].
extraMounts:
    - device: proc
      fs:    proc
      mountPoint: /proc
    - device: sys
      fs:    sysfs
      mountPoint: /sys
    - device: /dev
      mountPoint: /dev
      options: [ bind ]
    - device: /dev/pts
      fs:    devpts
      mountPoint: /dev/pts
    - device: tmpfs
      fs:    tmpfs
      mountPoint: /run
    - device: /run/udev
      mountPoint: /run/udev
      options: [ bind ]

extraMountsEfi:
    - device: efivarfs
      fs:    efivarfs
      mountPoint: /sys/firmware/efi/efivars

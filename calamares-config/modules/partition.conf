---
# Erase / Alongside / Manual modes. EFI is auto-created from
# efiSystemPartition*; partitionLayout adds the root partition that
# fills the rest of the disk. Without partitionLayout, Calamares only
# creates EFI and rsync ends up writing onto the live USB itself —
# which is exactly what bit us during the first install attempt.

efiSystemPartition:     "/boot/efi"
efiSystemPartitionSize: 512M
efiSystemPartitionName: "EFI"

userSwapChoices:
    - none
    - file

drawNestedPartitions:       true
alwaysShowPartitionLabels:  true

defaultFileSystemType:              "ext4"
availableFileSystemTypes:           [ "ext4" ]

enableLuksAutomatedPartitioning:    false

initialSwapChoice:                  file
initialPartitioningChoice:          erase

allowManualPartitioning:            true

# Root partition layout used by erase mode. The "100%" size token tells
# Calamares to claim every byte left after EFI + (optional) swap file.
#
# We DO NOT set the GPT partition type here — even though Calamares
# supports `type:` in some versions, it caused KDE/X11 to disconnect
# mid-install on this build. The bootloader recovery script
# (/usr/local/bin/vibeos-recover-bootloader) sets the x86_64-root
# GPT type via sgdisk after the install completes.
partitionLayout:
    - name:       "vibeos-root"
      filesystem: "ext4"
      mountPoint: "/"
      size:       "100%"

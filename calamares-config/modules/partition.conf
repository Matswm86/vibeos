---
# All three partition modes offered so users can choose:
#   - "Erase disk" (initial default, pick this if the drive should be
#     VibeOS-only — wipes everything)
#   - "Install alongside" (dual-boot: shrinks an existing OS partition
#     and installs VibeOS next to it)
#   - "Manual" (expert: pick partitions yourself)
# The Vibbey install-helper sidebar explains each choice in plain
# language so the user can't accidentally shrink a Windows partition
# they needed.

efiSystemPartition:     "/boot/efi"
efiSystemPartitionSize: 512M
efiSystemPartitionName: "EFI"

userSwapChoices:
    - none
    - file

drawNestedPartitions:       true
alwaysShowPartitionLabels:  true

defaultFileSystemType:              "ext4"
availableFileSystemTypes:           [ "ext4" ]

enableLuksAutomatedPartitioning:    false

initialSwapChoice:                  file
initialPartitioningChoice:          erase

allowManualPartitioning:            true

---
# Auto-erase partitioning. The "summary" module shows the exact device
# and size being erased before the exec phase starts — that IS the
# confirmation screen. Manual partitioning is disabled on purpose:
# VibeOS's install promise is "one click", and the user already reads
# the summary screen before committing.

efiSystemPartition:     "/boot/efi"
efiSystemPartitionSize: 512M
efiSystemPartitionName: "EFI"

# Swap policy — a small swap file covers suspend-to-disk on laptops
# without eating a swap partition. Users can opt out in the UI.
userSwapChoices:
    - none
    - file

drawNestedPartitions:       true
alwaysShowPartitionLabels:  true

defaultFileSystemType:              "ext4"
availableFileSystemTypes:           [ "ext4" ]

enableLuksAutomatedPartitioning:    false

initialSwapChoice:                  file
initialPartitioningChoice:          erase

# Only "Erase disk" is offered. Replace / alongside are hidden so users
# can't accidentally shrink a Windows partition they needed.
allowManualPartitioning:            false

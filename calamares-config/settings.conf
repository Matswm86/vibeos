# VibeOS Calamares — one-click install sequence.
#
# Shown screens (the view sequence):
#   welcome → locale → keyboard → partition → users → summary
# Execution sequence (kicks off after summary confirmation):
#   partition → mount → unpackfs → machineid → fstab →
#   locale → keyboard → localecfg → users → networkcfg →
#   hwclock → services-systemd → bootloader → umount
# Then a final "finished" view with a reboot button.
#
# The "summary" screen is our confirmation screen — it shows the exact
# block device + size that will be erased, per the Day 2 risk mandate:
# "No silent auto-erase. Show /dev/... + size before proceeding."

---
modules-search: [ local, /usr/lib/calamares/modules ]

instances:
  - id:     vibeos
    module: bootloader
    config: bootloader.conf

sequence:
  - show:
    - welcome
    - locale
    - keyboard
    - partition
    - users
    - summary
  - exec:
    - partition
    - mount
    - unpackfs
    - machineid
    - fstab
    - locale
    - keyboard
    - localecfg
    - users
    - networkcfg
    - hwclock
    - services-systemd
    - bootloader@vibeos
    - contextualprocess
    - umount
  - show:
    - finished

branding: vibeos

prompt-install: false
dont-chroot: false
oem-setup: false
disable-cancel: false
disable-cancel-during-exec: false
quit-at-end: false

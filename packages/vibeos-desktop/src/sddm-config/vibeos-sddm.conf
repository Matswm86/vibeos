[Theme]
# Breeze is the default KDE SDDM theme; we override its background + accents
# via /etc/sddm.conf.d so Day 2 ships without a custom QML theme (that path
# crashed on v1 real hardware). Custom QML is reserved for Day 5 polish.
Current=breeze

[General]
Background=/usr/share/wallpapers/VibeOS-PacificDawn/contents/images/3840x2160.svg
Numlock=on

[Users]
MaximumUid=60000
MinimumUid=1000
RememberLastSession=true
RememberLastUser=true

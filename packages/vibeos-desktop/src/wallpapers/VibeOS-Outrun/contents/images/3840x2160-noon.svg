      <stop offset="0%"  stop-color="#2A0E64"/>
      <stop offset="55%" stop-color="#6D2EFF"/>
      <stop offset="100%" stop-color="#FF6FB3"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" x2="0" y1="0" y2="1">

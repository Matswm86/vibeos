# VibeOS systemd-boot menu branding.
# systemd-boot does not support full graphical theming like GRUB, but the
# menu timeout, entry title, and console mode are configurable here.
# postinst installs this file into /boot/efi/loader/loader.conf on the
# target disk (if it exists — not on the live ISO).
default  vibeos-*.conf
timeout  3
console-mode  max
editor  no

# VibeOS Vibbey — single source of truth for all AI components.
# This file is read at startup by: vibbey (Python), vibbey.service (systemd).
# Format: KEY=VALUE  (no spaces around =, no quotes needed)
# Lines starting with # are comments and are ignored.
#
# Edit this file to change the active model or add API keys.
# After editing, restart the vibbey service:  systemctl restart vibbey

# ─── Local Ollama model ───────────────────────────────────────────────────────
# Model used when Groq is unavailable or opted out. Pre-baked into this ISO.
# Override with any Ollama model you've pulled: qwen2.5:7b, llama3.2:3b, etc.
VIBEOS_MODEL=qwen2.5:3b

# ─── Groq cloud (optional) ────────────────────────────────────────────────────
# For unlimited fast smart-mode answers. Get a free key at console.groq.com.
# Leave blank to use local Ollama only.
VIBEOS_GROQ_API_KEY=

# Groq model name. Only used when VIBEOS_GROQ_API_KEY is set.
VIBEOS_GROQ_MODEL=llama-3.3-70b-versatile

# ─── Claude Code (set up by vibeos-claude-code in Day 4) ─────────────────────
VIBEOS_CLAUDE_API_KEY=

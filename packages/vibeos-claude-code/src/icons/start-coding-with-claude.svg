<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff9a6b"/>
      <stop offset="55%" stop-color="#ff6a4d"/>
      <stop offset="100%" stop-color="#2a3a55"/>
    </linearGradient>
    <linearGradient id="glyph" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ffe6d5"/>
    </linearGradient>
  </defs>
  <!-- rounded app-icon tile -->
  <rect x="6" y="6" width="116" height="116" rx="22" ry="22" fill="url(#bg)"/>
  <!-- stylised prompt chevron -->
  <path d="M34 46 L58 64 L34 82"
        fill="none" stroke="url(#glyph)" stroke-width="8"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- cursor bar -->
  <rect x="66" y="78" width="30" height="6" rx="3" ry="3" fill="url(#glyph)"/>
  <!-- small spark / AI dot -->
  <circle cx="96" cy="36" r="6" fill="#ffffff" opacity="0.9"/>
  <circle cx="96" cy="36" r="3" fill="#ff6a4d"/>
</svg>

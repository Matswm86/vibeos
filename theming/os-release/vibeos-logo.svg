<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   xmlns="http://www.w3.org/2000/svg"
   width="256"
   height="256"
   viewBox="0 0 256 256"
   version="1.1">
  <defs>
    <radialGradient id="bgGradient" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0" stop-color="#2D1B4E"/>
      <stop offset="1" stop-color="#0B0218"/>
    </radialGradient>
    <linearGradient id="vGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF2ECF"/>
      <stop offset="1" stop-color="#01F9FF"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background hex -->
  <polygon points="128,12 236,74 236,182 128,244 20,182 20,74"
           fill="url(#bgGradient)"
           stroke="#FF2ECF"
           stroke-width="3"/>

  <!-- Inner hex ring -->
  <polygon points="128,32 216,84 216,172 128,224 40,172 40,84"
           fill="none"
           stroke="#01F9FF"
           stroke-width="2"
           stroke-opacity="0.5"/>

  <!-- V shape (VibeOS wordmark reduced to one letter) -->
  <path d="M 72 68 L 128 184 L 184 68"
        fill="none"
        stroke="url(#vGradient)"
        stroke-width="14"
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#glow)"/>

  <!-- Accent dot at vertex -->
  <circle cx="128" cy="184" r="6" fill="#FFE400" filter="url(#glow)"/>

  <!-- Grid lines corners -->
  <line x1="20" y1="74" x2="40" y2="84" stroke="#01F9FF" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="236" y1="74" x2="216" y2="84" stroke="#01F9FF" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="20" y1="182" x2="40" y2="172" stroke="#01F9FF" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="236" y1="182" x2="216" y2="172" stroke="#01F9FF" stroke-opacity="0.3" stroke-width="1"/>
</svg>

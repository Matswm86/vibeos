<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   xmlns="http://www.w3.org/2000/svg"
   width="256"
   height="128"
   viewBox="0 0 256 128"
   version="1.1">
  <defs>
    <linearGradient id="activeTitle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2D1B4E"/>
      <stop offset="1" stop-color="#1A0B2E"/>
    </linearGradient>
    <linearGradient id="inactiveTitle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1A0B2E"/>
      <stop offset="1" stop-color="#0B0218"/>
    </linearGradient>
    <linearGradient id="activeBorder" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FF2ECF" stop-opacity="0.0"/>
      <stop offset="0.5" stop-color="#01F9FF" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#FF2ECF" stop-opacity="0.0"/>
    </linearGradient>
  </defs>

  <!-- Active window decoration: 128x64 region -->
  <g id="decoration">
    <rect x="0" y="0" width="128" height="32" fill="url(#activeTitle)"/>
    <rect x="0" y="30" width="128" height="2" fill="url(#activeBorder)"/>
    <rect x="0" y="0" width="2" height="64" fill="#01F9FF" fill-opacity="0.6"/>
    <rect x="126" y="0" width="2" height="64" fill="#01F9FF" fill-opacity="0.6"/>
    <rect x="0" y="62" width="128" height="2" fill="#01F9FF" fill-opacity="0.6"/>
  </g>

  <!-- Inactive window decoration: 128x64 region -->
  <g id="decoration-inactive">
    <rect x="128" y="0" width="128" height="32" fill="url(#inactiveTitle)"/>
    <rect x="128" y="30" width="128" height="2" fill="#9D4EDD" fill-opacity="0.3"/>
    <rect x="128" y="0" width="2" height="64" fill="#9D4EDD" fill-opacity="0.3"/>
    <rect x="254" y="0" width="2" height="64" fill="#9D4EDD" fill-opacity="0.3"/>
    <rect x="128" y="62" width="128" height="2" fill="#9D4EDD" fill-opacity="0.3"/>
  </g>

  <!-- Button slots (close/maximize/minimize) at y=80..128 -->
  <g id="close-button">
    <circle cx="16" cy="96" r="10" fill="#FF2ECF" fill-opacity="0.8"/>
  </g>
  <g id="close-button-pressed">
    <circle cx="48" cy="96" r="10" fill="#FF71CE" fill-opacity="1.0"/>
  </g>
  <g id="close-button-hover">
    <circle cx="80" cy="96" r="10" fill="#FF2ECF" fill-opacity="1.0" stroke="#01F9FF" stroke-width="2"/>
  </g>

  <g id="maximize-button">
    <circle cx="112" cy="96" r="10" fill="#05FFA1" fill-opacity="0.8"/>
  </g>
  <g id="maximize-button-pressed">
    <circle cx="144" cy="96" r="10" fill="#05FFA1" fill-opacity="1.0"/>
  </g>
  <g id="maximize-button-hover">
    <circle cx="176" cy="96" r="10" fill="#05FFA1" fill-opacity="1.0" stroke="#01F9FF" stroke-width="2"/>
  </g>

  <g id="minimize-button">
    <circle cx="208" cy="96" r="10" fill="#FFE400" fill-opacity="0.8"/>
  </g>
  <g id="minimize-button-pressed">
    <circle cx="240" cy="96" r="10" fill="#FFE400" fill-opacity="1.0"/>
  </g>
</svg>

---
# VibeOS welcome module override.
# Replaces /etc/calamares/modules/welcome.conf so the requirements
# checker no longer flags missing internet as a hard error
# (the cause of the red "danger" banner that flashed at install start).

showSupportUrl:         true
showKnownIssuesUrl:     true
showReleaseNotesUrl:    true
showDonateUrl:          false

requirements:
    # Hard requirements — installer will refuse to proceed if any fail
    required:
        - storage
        - ram
        - root

    # Soft checks — shown to user but won't block install
    # `internet` lives here on purpose: live USB takes a few seconds
    # to acquire DHCP and Calamares used to flash a red error banner
    # before the check completed. Demoted so the welcome page stays
    # calm at startup.
    requiredStorage:    8.0
    requiredRam:        2.0
    internetCheckUrl:   https://github.com/Matswm86/vibeos
    check:
        - storage
        - ram
        - power
        - internet
        - root

geoip:
    style:    "none"

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3840 2160" width="3840" height="2160">
  <title>VibeOS · Outrun Boulevard</title>

  <defs>
    <!-- Sky: deep night → magenta → pink → orange → yellow (classic sunset) -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#1A0933"/>
      <stop offset="0.25" stop-color="#3A0F4F"/>
      <stop offset="0.45" stop-color="#6A2E85"/>
      <stop offset="0.6"  stop-color="#C13584"/>
      <stop offset="0.72" stop-color="#FF5A8F"/>
      <stop offset="0.83" stop-color="#FF7A00"/>
      <stop offset="0.92" stop-color="#FFB627"/>
    </linearGradient>

    <!-- Sun: yellow core → pink halo -->
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#FFE29A"/>
      <stop offset="0.5" stop-color="#FFB627"/>
      <stop offset="1"   stop-color="#FF5A8F"/>
    </linearGradient>

    <!-- Ground: dark plum → darker -->
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#2A0A3E"/>
      <stop offset="1"   stop-color="#0F0420"/>
    </linearGradient>

    <!-- Mountain silhouette -->
    <linearGradient id="mtn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1A0933"/>
      <stop offset="1" stop-color="#2A0A3E"/>
    </linearGradient>

    <!-- Sun cutout mask: horizontal slits (synthwave signature) -->
    <mask id="sunSlits">
      <rect x="1400" y="650" width="1040" height="700" fill="white"/>
      <rect x="1400" y="1140" width="1040" height="14" fill="black"/>
      <rect x="1400" y="1180" width="1040" height="12" fill="black"/>
      <rect x="1400" y="1214" width="1040" height="10" fill="black"/>
      <rect x="1400" y="1244" width="1040" height="8"  fill="black"/>
      <rect x="1400" y="1270" width="1040" height="7"  fill="black"/>
      <rect x="1400" y="1292" width="1040" height="6"  fill="black"/>
      <rect x="1400" y="1310" width="1040" height="5"  fill="black"/>
      <rect x="1400" y="1325" width="1040" height="4"  fill="black"/>
    </mask>
  </defs>

  <!-- Sky -->
  <rect width="3840" height="1350" fill="url(#sky)"/>

  <!-- Stars -->
  <g fill="#FFF4E6">
    <circle cx="240"  cy="180" r="2.5"/><circle cx="520"  cy="90"  r="2"/>
    <circle cx="860"  cy="210" r="2"/>  <circle cx="1180" cy="130" r="2.5"/>
    <circle cx="1520" cy="60"  r="1.8"/><circle cx="1840" cy="200" r="2"/>
    <circle cx="2220" cy="100" r="2.5"/><circle cx="2560" cy="170" r="1.8"/>
    <circle cx="2900" cy="80"  r="2"/>  <circle cx="3240" cy="220" r="2"/>
    <circle cx="3580" cy="140" r="2.5"/><circle cx="180"  cy="350" r="1.6"/>
    <circle cx="720"  cy="410" r="1.8"/><circle cx="1340" cy="340" r="2"/>
    <circle cx="2060" cy="400" r="1.8"/><circle cx="2780" cy="350" r="2"/>
    <circle cx="3440" cy="420" r="1.6"/>
  </g>

  <!-- Sun with horizontal slits -->
  <circle cx="1920" cy="1000" r="440" fill="url(#sun)" mask="url(#sunSlits)"/>

  <!-- Distant mountain range in silhouette -->
  <path d="M 0 1280
           L 220 1100 L 480 1200 L 760 1040 L 1020 1180 L 1280 1070
           L 1560 1160 L 1820 1050 L 2080 1170 L 2360 1060 L 2620 1170
           L 2900 1050 L 3160 1170 L 3440 1080 L 3680 1180 L 3840 1120
           L 3840 1350 L 0 1350 Z"
        fill="url(#mtn)"/>

  <!-- Horizon glow line -->
  <line x1="0" y1="1350" x2="3840" y2="1350"
        stroke="#FF5A8F" stroke-width="3" opacity="0.9"/>

  <!-- Ground -->
  <rect x="0" y="1350" width="3840" height="810" fill="url(#ground)"/>

  <!-- Perspective grid (Tron/Outrun signature) -->
  <g stroke="#FF006E" stroke-width="2" opacity="0.7" fill="none">
    <!-- Horizontal lines, growing spacing as they approach viewer -->
    <line x1="0" y1="1370"  x2="3840" y2="1370"/>
    <line x1="0" y1="1395"  x2="3840" y2="1395"/>
    <line x1="0" y1="1430"  x2="3840" y2="1430"/>
    <line x1="0" y1="1475"  x2="3840" y2="1475"/>
    <line x1="0" y1="1535"  x2="3840" y2="1535"/>
    <line x1="0" y1="1615"  x2="3840" y2="1615"/>
    <line x1="0" y1="1720"  x2="3840" y2="1720"/>
    <line x1="0" y1="1855"  x2="3840" y2="1855"/>
    <line x1="0" y1="2020"  x2="3840" y2="2020"/>

    <!-- Vanishing point: x=1920, y=1350 -->
    <line x1="1920" y1="1350" x2="-200"  y2="2160"/>
    <line x1="1920" y1="1350" x2="300"   y2="2160"/>
    <line x1="1920" y1="1350" x2="800"   y2="2160"/>
    <line x1="1920" y1="1350" x2="1300"  y2="2160"/>
    <line x1="1920" y1="1350" x2="1700"  y2="2160"/>
    <line x1="1920" y1="1350" x2="2140"  y2="2160"/>
    <line x1="1920" y1="1350" x2="2540"  y2="2160"/>
    <line x1="1920" y1="1350" x2="3040"  y2="2160"/>
    <line x1="1920" y1="1350" x2="3540"  y2="2160"/>
    <line x1="1920" y1="1350" x2="4040"  y2="2160"/>
  </g>

  <!-- Cyan highlight accents on grid -->
  <g stroke="#01F9FF" stroke-width="1" opacity="0.4" fill="none">
    <line x1="0" y1="1430" x2="3840" y2="1430"/>
    <line x1="0" y1="1720" x2="3840" y2="1720"/>
  </g>

  <!-- Wordmark bottom-right -->
  <text x="3720" y="2100" fill="#01F9FF" opacity="0.6"
        font-family="Orbitron, sans-serif" font-size="42" font-weight="bold"
        text-anchor="end" letter-spacing="10">VIBEOS</text>
</svg>

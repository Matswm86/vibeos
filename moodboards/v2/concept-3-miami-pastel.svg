<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3840 2160" width="3840" height="2160">
  <title>VibeOS · Miami Pastel</title>

  <defs>
    <!-- Soft background: warm cream → pale pink -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#FFF4E6"/>
      <stop offset="0.5" stop-color="#FFEEE0"/>
      <stop offset="1"   stop-color="#FFE4D6"/>
    </linearGradient>

    <!-- Big pink circle: coral → rose -->
    <radialGradient id="circlePink" cx="0.4" cy="0.4" r="0.6">
      <stop offset="0"   stop-color="#FFC5DD"/>
      <stop offset="0.5" stop-color="#FF9EBB"/>
      <stop offset="1"   stop-color="#FF6F9E"/>
    </radialGradient>

    <!-- Secondary orange circle -->
    <radialGradient id="circleOrange" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0"   stop-color="#FFD1A6"/>
      <stop offset="1"   stop-color="#FFA26B"/>
    </radialGradient>

    <!-- Mint accent circle -->
    <radialGradient id="circleMint" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0"   stop-color="#C8F5E0"/>
      <stop offset="1"   stop-color="#8FE4C0"/>
    </radialGradient>

    <!-- Palm leaf gradient -->
    <linearGradient id="palm" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#E9446A"/>
      <stop offset="1" stop-color="#FF6F9E"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="3840" height="2160" fill="url(#bg)"/>

  <!-- Scattered dots (terrazzo vibe) -->
  <g fill="#FF6F9E" opacity="0.12">
    <circle cx="420"  cy="380"  r="6"/>
    <circle cx="780"  cy="620"  r="4"/>
    <circle cx="1250" cy="280"  r="7"/>
    <circle cx="1680" cy="550"  r="5"/>
    <circle cx="2100" cy="340"  r="6"/>
    <circle cx="2560" cy="490"  r="4"/>
    <circle cx="3020" cy="260"  r="7"/>
    <circle cx="3420" cy="580"  r="5"/>
    <circle cx="300"  cy="1620" r="6"/>
    <circle cx="680"  cy="1880" r="4"/>
    <circle cx="1180" cy="1720" r="5"/>
    <circle cx="2240" cy="1830" r="6"/>
    <circle cx="2760" cy="1680" r="4"/>
    <circle cx="3380" cy="1900" r="5"/>
  </g>
  <g fill="#FFA26B" opacity="0.12">
    <circle cx="560"  cy="490" r="5"/>
    <circle cx="1380" cy="680" r="4"/>
    <circle cx="1950" cy="420" r="6"/>
    <circle cx="2820" cy="380" r="4"/>
    <circle cx="3240" cy="690" r="5"/>
    <circle cx="840"  cy="1780" r="6"/>
    <circle cx="1880" cy="1720" r="4"/>
    <circle cx="3080" cy="1820" r="5"/>
  </g>

  <!-- Main big pink circle, upper-left centered -->
  <circle cx="1480" cy="950" r="780" fill="url(#circlePink)" opacity="0.95"/>

  <!-- Orange circle overlapping from right -->
  <circle cx="2560" cy="780" r="460" fill="url(#circleOrange)" opacity="0.85"/>

  <!-- Small mint accent circle -->
  <circle cx="3180" cy="1180" r="210" fill="url(#circleMint)" opacity="0.8"/>

  <!-- Art deco thin triangles scattered -->
  <g fill="none" stroke="#FF6F9E" stroke-width="2" opacity="0.5">
    <polygon points="2950,1780 3050,1640 3150,1780"/>
    <polygon points="680,1680 760,1540 840,1680"/>
    <polygon points="420,1900 480,1820 540,1900"/>
  </g>

  <!-- Horizontal art deco stripes, bottom left -->
  <g stroke="#E9446A" stroke-width="3" opacity="0.35">
    <line x1="200"  y1="2000" x2="800"  y2="2000"/>
    <line x1="200"  y1="2020" x2="760"  y2="2020"/>
    <line x1="200"  y1="2040" x2="720"  y2="2040"/>
    <line x1="200"  y1="2060" x2="680"  y2="2060"/>
  </g>

  <!-- Palm silhouette, bottom-right corner -->
  <g transform="translate(3350, 2160)">
    <!-- Trunk -->
    <rect x="-12" y="-600" width="24" height="600" fill="#E9446A" opacity="0.75"/>
    <!-- Leaves (8 fronds) -->
    <g fill="url(#palm)" opacity="0.85">
      <path d="M 0 -600 Q -150 -700 -340 -680 Q -180 -630 -20 -580 Z"/>
      <path d="M 0 -600 Q 150 -700 340 -680 Q 180 -630 20 -580 Z"/>
      <path d="M 0 -600 Q -100 -780 -240 -830 Q -140 -720 -20 -610 Z"/>
      <path d="M 0 -600 Q 100 -780 240 -830 Q 140 -720 20 -610 Z"/>
      <path d="M 0 -600 Q 0 -820 -80 -920 Q -40 -760 -20 -620 Z"/>
      <path d="M 0 -600 Q 0 -820 80 -920 Q 40 -760 20 -620 Z"/>
      <path d="M 0 -600 Q -200 -640 -390 -580 Q -210 -600 -20 -590 Z"/>
      <path d="M 0 -600 Q 200 -640 390 -580 Q 210 -600 20 -590 Z"/>
    </g>
  </g>

  <!-- Wordmark top-left, art-deco feel -->
  <text x="180" y="220" fill="#E9446A" opacity="0.9"
        font-family="Orbitron, sans-serif" font-size="86" font-weight="bold"
        letter-spacing="22">VibeOS</text>
  <line x1="180" y1="260" x2="900" y2="260" stroke="#E9446A" stroke-width="4" opacity="0.6"/>
  <text x="180" y="315" fill="#FFA26B" opacity="0.9"
        font-family="Orbitron, sans-serif" font-size="28"
        letter-spacing="16">PACIFIC · AI · NATIVE</text>
</svg>

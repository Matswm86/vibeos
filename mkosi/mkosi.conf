# VibeOS v2 — mkosi build configuration (mkosi v26 syntax)
#
# Declarative replacement for the old Cubic workflow. Run with
# ./scripts/build.sh from the repo root.
#
# Output: mkosi.output/vibeos.raw — UEFI-bootable hybrid disk image.
# Write to USB directly with dd / balenaEtcher / Ventoy. Also bootable
# in qemu-system-x86_64 via scripts/qemu-boot.sh.
#
# mkosi docs: https://github.com/systemd/mkosi

[Distribution]
Distribution=ubuntu
Release=noble
Mirror=http://archive.ubuntu.com/ubuntu
Repositories=main universe multiverse restricted

[Output]
Format=disk
ImageId=vibeos
ImageVersion=2.0.0-dev
OutputDirectory=../mkosi.output
Output=vibeos

[Build]
# Persistent apt/package cache so rebuilds skip re-downloading 2GB of
# .debs. Cleared with `./scripts/build.sh clean`.
CacheDirectory=../mkosi.cache

[Content]
# Local apt repo of our own .debs (built by scripts/build-deb.sh).
# mkosi treats any directory listed here as an additional apt source
# and resolves Packages= against it alongside the Ubuntu archive and
# the Mozilla PPA registered in mkosi.prepare.chroot.
PackageDirectories=../packages/local
Bootable=yes
Bootloader=systemd-boot
Locale=en_US.UTF-8
Keymap=no-nodeadkeys
Timezone=Europe/Oslo
Hostname=vibeos
# No encrypted root for Day 1 — keeps the build simple. Add later.
Autologin=yes
# Kernel cmdline: silent boot with fallback to verbose on failure
KernelCommandLine=quiet splash loglevel=3 systemd.show_status=auto

# Trees copied into the built image as-is. Used here to ship the
# VibeOS Calamares configuration from calamares-config/ straight into
# /etc/calamares/ so the installer reads our settings.conf + modules
# + Pacific Dawn branding without any further copy step.
ExtraTrees=
    ../calamares-config:/etc/calamares

Packages=
    # Base
    ubuntu-minimal
    ubuntu-standard
    linux-image-generic
    linux-firmware
    systemd
    systemd-sysv
    systemd-resolved
    systemd-boot
    systemd-boot-efi
    dbus
    network-manager
    sudo
    # Display stack
    xwayland
    xserver-xorg-core
    # KDE Plasma 5.27 — Noble ships this as default
    kde-plasma-desktop
    sddm
    sddm-theme-breeze
    plasma-nm
    plasma-pa
    # polkit auth agent — required so `pkexec calamares` (Install VibeOS
    # desktop shortcut + live-autostart wrapper) can actually prompt the
    # user in the Plasma session. Without this, pkexec exits silently
    # and the Install icon appears to do nothing.
    polkit-kde-agent-1
    # KDE apps
    konsole
    dolphin
    kate
    kinfocenter
    kscreen
    # Theming infra — our themes/ packages plug into these
    breeze
    breeze-gtk-theme
    qt5-style-kvantum
    qt5-style-kvantum-themes
    papirus-icon-theme
    # fonts-orbitron not in Noble — shipped via vibeos-desktop.deb on Day 2
    fonts-jetbrains-mono
    plymouth
    plymouth-themes
    # Installer — bare calamares, our settings ship in packages/vibeos-desktop
    # (calamares-settings-ubuntu does not exist in Noble)
    calamares
    # Dev baseline promised in v2-plan.md
    zsh
    zsh-common
    git
    curl
    wget
    jq
    build-essential
    python3
    python3-pip
    python3-venv
    nodejs
    npm
    # firefox is installed explicitly in mkosi.prepare.chroot (from the
    # Mozilla PPA registered there) so it survives the snapd cascade
    # removal. Do NOT list it here — would re-pull archive stub.
    # Flatpak (Flathub added in postinst)
    flatpak
    plasma-discover-backend-flatpak
    # Misc
    vim
    nano
    htop
    # fastfetch not in Noble — Day 2 adds it from GitHub release .deb
    neofetch
    ca-certificates
    gnupg
    # VibeOS branding package (Pacific Dawn L&F, wallpapers, Plymouth,
    # SDDM config, Orbitron font, os-release). Built by
    # scripts/build-deb.sh into packages/local/ and consumed via the
    # PackageDirectories= option above.
    vibeos-desktop
    # VibeOS Vibbey AI assistant (HTTP server + webkit2gtk window + systemd
    # unit + single-config /etc/vibeos/vibbey.conf). Depends: ollama (also
    # in packages/local/ via scripts/build-deb.sh download step).
    vibeos-vibbey
    # webkit2gtk for the Vibbey window (fallback: system browser)
    gir1.2-webkit2-4.1
    python3-gi
    # VibeOS Claude Code first-run wizard + profile hook + desktop shortcut.
    # The @anthropic-ai/claude-code npm package itself is installed globally
    # by mkosi.postinst.chroot so it's baked into the ISO. This .deb carries
    # the VibeOS-side glue only.
    vibeos-claude-code
    # Keyring + dialog tooling the wizard shells out to.
    libsecret-tools
    kdialog
    zenity

RemovePackages=
    snapd
    ubuntu-advantage-tools
    popularity-contest
    apport
    whoopsie

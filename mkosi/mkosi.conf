# VibeOS v2 — mkosi build configuration
#
# Declarative replacement for the old Cubic workflow. Run with
# `./scripts/build.sh` from the repo root.
#
# mkosi docs: https://github.com/systemd/mkosi/blob/main/mkosi/resources/man/mkosi.1.md

[Distribution]
Distribution=ubuntu
Release=noble
# Canonical's mirror. Overridable via `--mirror` flag in scripts/build.sh
# if we ever want to test against another mirror.
Mirror=http://archive.ubuntu.com/ubuntu
Repositories=main universe multiverse restricted

[Output]
Format=disk
ImageId=vibeos
ImageVersion=2.0.0-dev
OutputDirectory=../mkosi.output
# Two outputs: a raw disk image (for hybrid BIOS+UEFI booting) and an
# ISO-9660 image suitable for USB writing with `dd` or balenaEtcher.
SplitArtifacts=no

[Content]
Bootable=yes
Bootloader=systemd-boot
Locale=en_US.UTF-8
Keymap=no-nodeadkeys
Timezone=Europe/Oslo
Hostname=vibeos

# Core Ubuntu + KDE Plasma 5.27 base. Each package is justified in-line;
# if you add one, explain why.
Packages=
    # Base system
    ubuntu-minimal
    ubuntu-standard
    linux-image-generic
    linux-firmware
    systemd
    systemd-sysv
    systemd-resolved
    dbus
    network-manager
    # Display stack — Wayland-first, X11 fallback
    xwayland
    xserver-xorg-core
    # KDE Plasma 5.27 desktop (Noble ships this by default)
    kde-plasma-desktop
    sddm
    sddm-theme-breeze
    kde-config-sddm
    plasma-nm
    plasma-pa
    plasma-systemmonitor
    # Essential Plasma apps
    konsole
    dolphin
    kate
    kinfocenter
    kscreen
    ksystemlog
    # Theming infrastructure — these are what our themes/ packages plug into
    breeze breeze-gtk-theme
    qt5-style-kvantum qt5-style-kvantum-themes
    papirus-icon-theme
    fonts-orbitron
    fonts-jetbrains-mono
    plymouth plymouth-themes
    # Installer
    calamares calamares-settings-ubuntu
    # User-space baseline the VibeOS pitch promises
    zsh zsh-common
    git curl wget jq
    build-essential
    python3 python3-pip python3-venv
    nodejs npm
    firefox-esr
    # Flatpak (Flathub added at postinst)
    flatpak plasma-discover-backend-flatpak
    # Helpers
    sudo vim nano htop fastfetch
    ca-certificates gnupg

# Packages we explicitly do NOT want (saves ~400MB and avoids snap)
RemovePackages=
    snapd
    ubuntu-advantage-tools
    landscape-common
    popularity-contest
    apport
    whoopsie

[Distribution]
# Use the PPAs we promised in v2-plan.md — these get added via
# mkosi.extra/etc/apt/sources.list.d/ before the big package install.

[Validation]
# No signature checks bypassed — mkosi uses apt's normal signing.

[Host]
# Run the build with network access (needs to fetch ~2GB of .deb files).
# Final image has no dependency on this network.
NetworkVeth=yes

[Runtime]
# When `mkosi qemu` is used (not our primary flow, but handy), boot with
# these defaults. Our scripts/qemu-boot.sh uses raw qemu for more control.
RAM=4G
CPUs=2

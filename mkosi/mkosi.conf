# VibeOS v2 — mkosi build configuration (mkosi v26 syntax)
#
# Declarative replacement for the old Cubic workflow. Run with
# ./scripts/build.sh from the repo root.
#
# Output: mkosi.output/vibeos.raw — UEFI-bootable hybrid disk image.
# Write to USB directly with dd / balenaEtcher / Ventoy. Also bootable
# in qemu-system-x86_64 via scripts/qemu-boot.sh.
#
# mkosi docs: https://github.com/systemd/mkosi

[Distribution]
Distribution=ubuntu
Release=noble
Mirror=http://archive.ubuntu.com/ubuntu
Repositories=main universe multiverse restricted

[Output]
Format=disk
ImageId=vibeos
ImageVersion=2.0.0-dev
OutputDirectory=../mkosi.output
Output=vibeos
# Persistent apt/package cache so rebuilds skip re-downloading 2GB of
# .debs. Cleared with `./scripts/build.sh clean`.
CacheDirectory=../mkosi.cache

[Content]
Bootable=yes
Bootloader=systemd-boot
Locale=en_US.UTF-8
Keymap=no-nodeadkeys
Timezone=Europe/Oslo
Hostname=vibeos
# No encrypted root for Day 1 — keeps the build simple. Add later.
Autologin=yes
# Kernel cmdline: silent boot with fallback to verbose on failure
KernelCommandLine=quiet splash loglevel=3 systemd.show_status=auto

Packages=
    # Base
    ubuntu-minimal
    ubuntu-standard
    linux-image-generic
    linux-firmware
    systemd
    systemd-sysv
    systemd-resolved
    systemd-boot
    systemd-boot-efi
    dbus
    network-manager
    sudo
    # Display stack
    xwayland
    xserver-xorg-core
    # KDE Plasma 5.27 — Noble ships this as default
    kde-plasma-desktop
    sddm
    sddm-theme-breeze
    plasma-nm
    plasma-pa
    # KDE apps
    konsole
    dolphin
    kate
    kinfocenter
    kscreen
    # Theming infra — our themes/ packages plug into these
    breeze
    breeze-gtk-theme
    qt5-style-kvantum
    qt5-style-kvantum-themes
    papirus-icon-theme
    # fonts-orbitron not in Noble — shipped via vibeos-desktop.deb on Day 2
    fonts-jetbrains-mono
    plymouth
    plymouth-themes
    # Installer — bare calamares, our settings ship in packages/vibeos-desktop
    # (calamares-settings-ubuntu does not exist in Noble)
    calamares
    # Dev baseline promised in v2-plan.md
    zsh
    zsh-common
    git
    curl
    wget
    jq
    build-essential
    python3
    python3-pip
    python3-venv
    nodejs
    npm
    firefox
    # Flatpak (Flathub added in postinst)
    flatpak
    plasma-discover-backend-flatpak
    # Misc
    vim
    nano
    htop
    # fastfetch not in Noble — Day 2 adds it from GitHub release .deb
    neofetch
    ca-certificates
    gnupg

RemovePackages=
    snapd
    ubuntu-advantage-tools
    popularity-contest
    apport
    whoopsie
